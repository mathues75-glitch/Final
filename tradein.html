<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Gaming Palace | Trade-In</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">The Gaming Palace</div>

    <nav>
        <a href="index.html">Home</a>

        <div class="dropdown">
            <a href="#">Shop ▼</a>
            <div class="dropdown-content">
                <a href="consoles.html">Consoles</a>
                <a href="videogames.html">Video Games</a>
                <a href="accessories.html">Accessories</a>
            </div>
        </div>

        <a href="tradein.html">Trade-In</a>
        <a href="profile.html">Profile</a>

        <a href="cart.html">
            Cart 🛒 <span id="cartCount">0</span>
        </a>
    </nav>
</header>

<main>
    <h1>Trade-In Console</h1>

    <section class="shop-box-container">

        <div class="shop-box">

            <h3>Select Console</h3>

            <select id="consoleSelect">

                <optgroup label="PlayStation">
                    <option value="ps1">PlayStation 1</option>
                    <option value="ps2">PlayStation 2</option>
                    <option value="ps3">PlayStation 3</option>
                    <option value="ps4">PlayStation 4</option>
                    <option value="ps5">PlayStation 5</option>
                    <option value="psp">PSP</option>
                    <option value="psvita">PS Vita</option>
                </optgroup>

                <optgroup label="Xbox">
                    <option value="xbox360">Xbox 360</option>
                    <option value="xboxone">Xbox One</option>
                    <option value="xboxseries">Xbox Series X</option>
                </optgroup>

                <optgroup label="Nintendo">
                    <option value="wii">Nintendo Wii</option>
                    <option value="wiiu">Wii U</option>
                    <option value="switch">Nintendo Switch</option>
                    <option value="switcholed">Switch OLED</option>
                    <option value="ds">Nintendo DS</option>
                    <option value="3ds">Nintendo 3DS</option>
                </optgroup>

                <optgroup label="Retro">
                    <option value="gamecube">GameCube</option>
                    <option value="n64">Nintendo 64</option>
                    <option value="sega">Sega Genesis</option>
                </optgroup>

            </select>

            <h3>Condition</h3>

            <select id="conditionSelect">
                <option value="excellent">Excellent</option>
                <option value="good">Good</option>
                <option value="fair">Fair</option>
                <option value="poor">Poor</option>
            </select>

            <button onclick="tradeInConsole()">Trade In</button>

            <p id="tradeResult"></p>

        </div>

    </section>
</main>

<script src="script.js"></script>

<script>
window.addEventListener("load", () => {
    updateCartCount();
    checkAutoLogin();
    updateNavUser();
});
</script>

</body>
</html>
